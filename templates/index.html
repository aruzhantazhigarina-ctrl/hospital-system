<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Booking</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #667eea, #764ba2);

    display: flex;
    flex-direction: column;
    align-items: center;   /* ✅ центр по горизонтали */
}

.container {
    background: rgba(255,255,255,0.1);
    padding: 25px;
    margin: 20px auto;
    width: 100%;
    max-width: 450px;      /* ✅ фикс ширина */
    border-radius: 20px;
    backdrop-filter: blur(10px);

    display: flex;
    flex-direction: column;
    align-items: center;   /* ✅ центр содержимого */
}

input, select {
    width: 100%;
    max-width: 380px;      /* ✅ чтобы не “прыгали” */
    padding: 12px;
    margin: 8px 0;
    border-radius: 10px;
    border: none;
    font-size: 16px;
}

button {
    width: 100%;
    max-width: 380px;
    padding: 12px;
}
#records {
    margin-top: 20px;
}

.card {
    background: rgba(255,255,255,0.2);
    padding: 15px;
    margin: 10px 0;
    border-radius: 15px;
}

img {
    width: 100%;
    border-radius: 15px;
}

</style>
</head>
<body>
    <h1 style="color:red;">TEST NEW UI</h1>

<h1>💊 Online Booking</h1>

<div class="container">

<select id="district" onchange="loadDoctors()"></select>
<select id="doctor" onchange="loadTime()"></select>

<input id="name_input" placeholder="Full name">
<input id="iin_input" placeholder="IIN">
<input id="phone_input" placeholder="Phone">

<select id="gender_input">
<option>M</option>
<option>F</option>
</select>

<input type="date" id="date_input" onchange="loadTime()">
<select id="time_input"></select>

<button onclick="book()">📅 Book</button>

</div>

<div class="container">
<h2>📋 My Records</h2>

<input id="search_iin" placeholder="Enter IIN">
<button onclick="loadRecords()">Show</button>

<div id="records"></div>
</div>

<script>
function el(id){return document.getElementById(id)}

async function loadDistricts(){
 let r=await fetch('/districts')
 let d=await r.json()
 el('district').innerHTML=''
 d.forEach(x=>{
  el('district').innerHTML+=`<option value="${x.id}">${x.name}</option>`
 })
 if(d.length>0){
  el('district').value=d[0].id
  loadDoctors()
 }
}

async function loadDoctors(){
 let r=await fetch('/doctors/'+el('district').value)
 let d=await r.json()
 el('doctor').innerHTML=''
 d.forEach(x=>{
  el('doctor').innerHTML+=`<option value="${x.id}">${x.full_name}</option>`
 })
 loadTime()
}

async function loadTime(){
 if(!el('date_input').value)return
 let r=await fetch(`/available/${el('doctor').value}/${el('date_input').value}`)
 let d=await r.json()
 el('time_input').innerHTML=''
 d.forEach(t=>{
  el('time_input').innerHTML+=`<option>${t}</option>`
 })
}

async function book(){
 let res=await fetch('/add',{
  method:'POST',
  headers:{'Content-Type':'application/json'},
  body:JSON.stringify({
   name:el('name_input').value,
   iin:el('iin_input').value,
   phone:el('phone_input').value,
   gender:el('gender_input').value,
   doctor_id:parseInt(el('doctor').value),
   date:el('date_input').value,
   time:el('time_input').value
  })
 })
 let text=await res.text()
 alert(text==='OK'?'✅ Booked!':'❌ '+text)
 loadTime()
}

async function loadRecords(){
 let r=await fetch('/records_by_iin/'+el('search_iin').value)
 let d=await r.json()
 el('records').innerHTML=''
 d.forEach(x=>{
  el('records').innerHTML+=`
  <div class="card">
    <img src="https://media.giphy.com/media/l0MYt5jPR6QX5pnqM/giphy.gif">
    <p><b>👨‍⚕️ ${x.doctor}</b></p>
    <p>📝 ${x.diagnosis}</p>
  </div>`
 })
}

window.onload=loadDistricts
</script>

</body>
</html>
