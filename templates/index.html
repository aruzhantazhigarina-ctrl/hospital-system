<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Hospital Booking</title>
</head>
<body>

<h1>Booking</h1>

<select id="district" onchange="loadDoctors()"></select><br><br>
<select id="doctor" onchange="loadTime()"></select><br><br>

<input id="name" placeholder="Full name">
<input id="iin" placeholder="IIN">
<input id="phone" placeholder="Phone">

<select id="gender">
    <option value="M">M</option>
    <option value="F">F</option>
</select>

<br><br>

<input type="date" id="date" onchange="loadTime()"><br><br>

<select id="time"></select><br><br>

<button onclick="book()">Book</button>

<hr>

<script>

async function loadDistricts() {
    let r = await fetch("/districts");
    let d = await r.json();

    district.innerHTML = "";

    d.forEach(x => {
        district.innerHTML += `
        <option value="${x.id}">
        ${x.name} — ${x.address}
        </option>`;
    });

    loadDoctors();
}

async function loadDoctors() {
    let r = await fetch("/doctors/" + district.value);
    let d = await r.json();

    doctor.innerHTML = "";

    d.forEach(x => {
        doctor.innerHTML += `
        <option value="${x.id}">
        ${x.full_name} (${x.specialization}) кабинет ${x.cabinet}
        </option>`;
    });

    loadTime();
}

async function loadTime() {
    if (!date.value || !doctor.value) return;

    let r = await fetch(`/available/${doctor.value}/${date.value}`);
    let d = await r.json();

    time.innerHTML = "";

    d.forEach(x => {
        time.innerHTML += `<option value="${x}">${x}</option>`;
    });

    // 💣 ВОТ ГЛАВНЫЙ ФИКС
    if (d.length > 0) {
        time.value = d[0]; // автоматически выбираем первое время
    }
}

async function book() {

    let data = {
        name: name.value.trim(),
        iin: iin.value.trim(),
        phone: phone.value.trim(),
        gender: gender.value,
        doctor_id: doctor.value,
        date: date.value,
        time: time.value
    };

    console.log("DATA:", data);

    if (!data.name || !data.iin || !data.phone || !data.date || !data.time) {
        alert("❌ Выбери дату и время + заполни данные!");
        return;
    }

    let res = await fetch("/add", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify(data)
    });

    let text = await res.text();

    if (text === "TIME_BUSY") {
        alert("❌ Занято!");
        return;
    }

    if (text === "WEEKEND") {
        alert("❌ Только будни!");
        return;
    }

    if (text === "ERROR") {
        alert("❌ Ошибка!");
        return;
    }

    alert("✅ Записано!");
    loadTime();
}

window.onload = loadDistricts;

</script>

</body>
</html>
