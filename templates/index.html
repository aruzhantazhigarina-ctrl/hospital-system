<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Booking</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #667eea, #764ba2);
    display: flex;
    flex-direction: column;
    align-items: center;
}

h1 {
    color: white;
}

.container {
    background: rgba(255,255,255,0.1);
    padding: 25px;
    margin: 20px;
    width: 100%;
    max-width: 450px;
    border-radius: 20px;
    backdrop-filter: blur(10px);
    display: flex;
    flex-direction: column;
    align-items: center;
}

input, select, button {
    width: 100%;
    max-width: 380px;
    padding: 12px;
    margin: 10px 0;
    border-radius: 10px;
    border: none;
    font-size: 16px;
}

select {
    cursor: pointer;
}

button {
    background: #ff7eb3;
    color: white;
    cursor: pointer;
}

.card {
    background: rgba(255,255,255,0.2);
    padding: 15px;
    margin: 10px 0;
    border-radius: 15px;
}
</style>
</head>

<body>

<!-- 🌐 Переключатель языка -->
<select id="lang" onchange="setLang(this.value)">
  <option value="ru">Русский</option>
  <option value="kz">Қазақша</option>
</select>

<h1 id="title"></h1>

<div class="container">

<select id="district" onchange="loadDoctors()"></select>
<select id="doctor" onchange="loadTime()"></select>

<input id="name_input">
<input id="iin_input">
<input id="phone_input">

<select id="gender_input">
<option></option>
<option></option>
</select>

<input type="date" id="date_input" onchange="loadTime()">
<select id="time_input"></select>

<button onclick="book()"></button>

</div>

<div class="container">
<h2 id="records_title"></h2>

<input id="search_iin">
<button onclick="loadRecords()" id="show_btn"></button>

<div id="records"></div>
</div>

<script>
function el(id){return document.getElementById(id)}

// 🌐 переводы
const T = {
  ru: {
    title: "💊 Запись на приём",
    name: "ФИО",
    iin: "ИИН",
    phone: "Телефон",
    gender_m: "Мужской",
    gender_f: "Женский",
    book: "📅 Записаться",
    records: "📋 Мои записи",
    search: "Введите ИИН",
    show: "Показать"
  },
  kz: {
    title: "💊 Дәрігерге жазылу",
    name: "Аты-жөні",
    iin: "ЖСН",
    phone: "Телефон",
    gender_m: "Ер",
    gender_f: "Әйел",
    book: "📅 Жазылу",
    records: "📋 Менің жазбаларым",
    search: "ЖСН енгізіңіз",
    show: "Көрсету"
  }
};

// 🌐 смена языка
function setLang(lang){
  localStorage.setItem("lang", lang)
  const t = T[lang]

  el("title").innerText = t.title
  el("name_input").placeholder = t.name
  el("iin_input").placeholder = t.iin
  el("phone_input").placeholder = t.phone

  document.querySelector("#gender_input option:nth-child(1)").innerText = t.gender_m
  document.querySelector("#gender_input option:nth-child(2)").innerText = t.gender_f

  document.querySelector("button[onclick='book()']").innerText = t.book

  el("records_title").innerText = t.records
  el("search_iin").placeholder = t.search
  el("show_btn").innerText = t.show
}

// 🚀 загрузка
window.onload = () => {
  let today = new Date().toISOString().split('T')[0];
  el('date_input').value = today;

  loadDistricts();

  let lang = localStorage.getItem("lang") || "ru"
  el("lang").value = lang
  setLang(lang)
}

// 🔽 данные
async function loadDistricts(){
 let r=await fetch('/districts')
 let d=await r.json()

 el('district').innerHTML=''

 d.forEach(x=>{
  el('district').innerHTML+=`
    <option value="${x.id}">
      ${x.name} — ${x.address}
    </option>`
 })

 if(d.length>0){
  el('district').value=d[0].id
  loadDoctors()
 }
}

async function loadDoctors(){
 let r=await fetch('/doctors/'+el('district').value)
 let d=await r.json()

 el('doctor').innerHTML=''

 d.forEach(x=>{
  el('doctor').innerHTML+=`
    <option value="${x.id}">
      ${x.full_name} — ${x.specialization} (каб. ${x.cabinet})
    </option>`
 })

 loadTime()
}

async function loadTime(){
 if(!el('date_input').value)return

 let r=await fetch(`/available/${el('doctor').value}/${el('date_input').value}`)
 let d=await r.json()

 el('time_input').innerHTML=''

 d.forEach(t=>{
  el('time_input').innerHTML+=`<option>${t}</option>`
 })
}

async function book(){
 let res=await fetch('/add',{
  method:'POST',
  headers:{'Content-Type':'application/json'},
  body:JSON.stringify({
   name:el('name_input').value,
   iin:el('iin_input').value,
   phone:el('phone_input').value,
   gender:el('gender_input').value,
   doctor_id:parseInt(el('doctor').value),
   date:el('date_input').value,
   time:el('time_input').value
  })
 })

 let text=await res.text()
 alert(text==='OK'?'✅':'❌ '+text)
 loadTime()
}

async function loadRecords(){
 let r=await fetch('/records_by_iin/'+el('search_iin').value)
 let d=await r.json()

 el('records').innerHTML=''

 d.forEach(x=>{
  el('records').innerHTML+=`
  <div class="card">
    <p><b>${x.doctor}</b></p>
    <p>${x.diagnosis}</p>
  </div>`
 })
}
</script>

</body>
</html>
