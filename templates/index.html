<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Booking</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #667eea, #764ba2);
    display: flex;
    flex-direction: column;
    align-items: center;
}

h1 {
    color: white;
}

.container {
    background: rgba(255,255,255,0.1);
    padding: 25px;
    margin: 20px;
    width: 100%;
    max-width: 450px;
    border-radius: 20px;
    backdrop-filter: blur(10px);
    display: flex;
    flex-direction: column;
    align-items: center;
}

input, select, button {
    width: 100%;
    max-width: 380px;
    padding: 12px;
    margin: 10px 0;
    border-radius: 10px;
    border: none;
    font-size: 16px;
}

select {
    cursor: pointer;
}

button {
    background: #ff7eb3;
    color: white;
    cursor: pointer;
}

.card {
    background: rgba(255,255,255,0.2);
    padding: 15px;
    margin: 10px 0;
    border-radius: 15px;
}

img {
    width: 100%;
    border-radius: 15px;
}
</style>
</head>

<body>

<h1>💊 Дәрігерге жазылу</h1>

<div class="container">

<select id="district" onchange="loadDoctors()"></select>
<select id="doctor" onchange="loadTime()"></select>

<input id="name_input" placeholder="Толық аты-жөніңіз">
<input id="iin_input" placeholder="ЖСН">
<input id="phone_input" placeholder="Телефон нөміріңіз">

<select id="gender_input">
<option>Е</option>
<option>Ә</option>
</select>

<input type="date" id="date_input" onchange="loadTime()">
<select id="time_input"></select>

<button onclick="book()">📅 Жазылу</button>

</div>

<div class="container">
<h2>📋 Қабылдау нәтижесі</h2>

<input id="search_iin" placeholder="ЖСН енгізіңіз">
<button onclick="loadRecords()">Көрсету</button>

<div id="records"></div>
</div>

<script>
function el(id){return document.getElementById(id)}

window.onload = () => {
    let today = new Date().toISOString().split('T')[0];
    el('date_input').value = today;
    loadDistricts();
}

async function loadDistricts(){
 let r=await fetch('/districts')
 let d=await r.json()

 el('district').innerHTML=''

 d.forEach(x=>{
  el('district').innerHTML+=`
    <option value="${x.id}">
      ${x.name} — ${x.address}
    </option>`
 })

 if(d.length>0){
  el('district').value=d[0].id
  loadDoctors()
 }
}

async function loadDoctors(){
 let r=await fetch('/doctors/'+el('district').value)
 let d=await r.json()

 el('doctor').innerHTML=''

 d.forEach(x=>{
  el('doctor').innerHTML+=`
    <option value="${x.id}">
      ${x.full_name} — ${x.specialization} (каб. ${x.cabinet})
    </option>`
 })

 loadTime()
}

async function loadTime(){
 if(!el('date_input').value)return

 let r=await fetch(`/available/${el('doctor').value}/${el('date_input').value}`)
 let d=await r.json()

 el('time_input').innerHTML=''

 d.forEach(t=>{
  el('time_input').innerHTML+=`<option>${t}</option>`
 })
}

async function book(){
 let res=await fetch('/add',{
  method:'POST',
  headers:{'Content-Type':'application/json'},
  body:JSON.stringify({
   name:el('name_input').value,
   iin:el('iin_input').value,
   phone:el('phone_input').value,
   gender:el('gender_input').value,
   doctor_id:parseInt(el('doctor').value),
   date:el('date_input').value,
   time:el('time_input').value
  })
 })

 let text=await res.text()
 alert(text==='OK'?'✅ Сіз жазылдыңыз!':'❌ '+text)
 loadTime()
}

async function loadRecords(){
 let r=await fetch('/records_by_iin/'+el('search_iin').value)
 let d=await r.json()

 el('records').innerHTML=''

 d.forEach(x=>{
  el('records').innerHTML+=`
  <div class="card">
    <p><b>👨‍⚕️ ${x.doctor}</b></p>
    <p>📝 ${x.diagnosis}</p>
  </div>`
 })
}
</script>

</body>
</html>
