<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Hospital</title>
</head>
<body>

<h1>Booking</h1>

<select id="district" onchange="loadDoctors()"></select><br><br>
<select id="doctor" onchange="loadTime()"></select><br><br>

<input id="name" placeholder="Name">
<input id="iin" placeholder="IIN">
<input id="phone" placeholder="Phone">

<select id="gender">
<option value="M">M</option>
<option value="F">F</option>
</select>

<br><br>

<input type="date" id="date" onchange="loadTime()"><br><br>

<select id="time"></select><br><br>

<button onclick="book()">Book</button>

<hr>

<h2>Medical Records</h2>
<input id="search_iin" placeholder="IIN">
<button onclick="loadRecords()">Show</button>

<div id="records"></div>

<script>

async function loadDistricts(){
let r=await fetch("/districts");
let d=await r.json();

district.innerHTML="";
d.forEach(x=>{
district.innerHTML+=`<option value="${x.id}">${x.name} - ${x.address}</option>`;
});

loadDoctors();
}

async function loadDoctors(){
let r=await fetch("/doctors/"+district.value);
let d=await r.json();

doctor.innerHTML="";
d.forEach(x=>{
doctor.innerHTML+=`<option value="${x.id}">${x.full_name}</option>`;
});

loadTime();
}

async function loadTime(){
if(!doctor.value||!date.value)return;

let r=await fetch(`/available/${doctor.value}/${date.value}`);
let d=await r.json();

time.innerHTML="";
d.forEach(t=>{
time.innerHTML+=`<option value="${t}">${t}</option>`;
});
}

async function book(){

let data={
name:name.value,
iin:iin.value,
phone:phone.value,
gender:gender.value,
doctor_id:doctor.value,
date:date.value,
time:time.value
};

if(!data.name||!data.iin||!data.phone||!data.date||!data.time){
alert("fill all");
return;
}

let r=await fetch("/add",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(data)
});

let t=await r.text();
alert(t);

loadTime();
}

async function loadRecords(){
let iin=document.getElementById("search_iin").value;

let r=await fetch("/records_by_iin/"+iin);
let d=await r.json();

records.innerHTML="";
d.forEach(x=>{
records.innerHTML+=`<p>${x.doctor} - ${x.diagnosis}</p>`;
});
}

window.onload=loadDistricts;

</script>

</body>
</html>
