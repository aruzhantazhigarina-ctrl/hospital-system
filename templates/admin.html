<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Admin Panel</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #4facfe, #00f2fe);

    display: flex;
    flex-direction: column;
    align-items: center; /* центр */
}

h1 {
    color: white;
    font-size: 40px;
    margin: 20px 0;
    text-align: center;
}

button {
    padding: 12px 25px;
    font-size: 18px;
    border: none;
    border-radius: 10px;
    background: #ff7eb3;
    color: white;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.05);
    background: #ff4f9a;
}

.top-btn {
    margin-bottom: 20px;
}

#out {
    width: 100%;
    max-width: 1100px; /* ровная сетка */
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 20px;
    padding: 20px;
    box-sizing: border-box;
}

.card {
    background: rgba(255, 255, 255, 0.95);
    border-radius: 20px;
    padding: 20px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    animation: fadeIn 0.5s ease;
    text-align: left;
}

.card img {
    width: 100%;
    border-radius: 15px;
    margin-bottom: 10px;
}

.card h3 {
    margin: 0 0 5px 0;
    font-size: 20px;
}

.card p {
    margin: 4px 0;
    font-size: 15px;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}

.form {
    width: 100%;
    max-width: 400px;
    background: white;
    padding: 20px;
    margin: 20px;
    border-radius: 15px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);

    display: flex;
    flex-direction: column;
    align-items: center;
}

input, select {
    width: 100%;
    max-width: 320px;
    padding: 10px;
    margin: 8px 0;
    border-radius: 8px;
    border: 1px solid #ccc;
    font-size: 16px;
}

.form button {
    width: 100%;
    max-width: 320px;
}

</style>
</head>
<body>

<h1>✨ Admin Panel</h1>

<button class="top-btn" onclick="load()">📋 Show Appointments</button>

<div id="out"></div>

<div class="form">
    <h2>➕ Add Diagnosis</h2>

    <select id="patient"></select>
    <input id="doctor_id" placeholder="Doctor ID">
    <input id="diagnosis" placeholder="Diagnosis">

    <button onclick="save()">💾 Save</button>
</div>

<script>

async function load() {
    let r = await fetch("/all_appointments");
    let d = await r.json();

    out.innerHTML = "";

    d.forEach(x => {
        out.innerHTML += `
        <div class="card">
            <img src="https://media.giphy.com/media/3o7TKtnuHOHHUjR38Y/giphy.gif">
            
            <h3>👩‍⚕️ ${x.doctor}</h3>
            <p>🩺 ${x.specialization}</p>
            <p>🚪 Кабинет: ${x.cabinet}</p>

            <hr>

            <p>🙍 ${x.patient}</p>
            <p>📱 ИИН: ${x.iin}</p>

            <hr>

            <p>📆 ${x.date}</p>
            <p>⏱️ ${x.time}</p>
        </div>`;
    });
}

async function loadPatients() {
    let r = await fetch("/patients");
    let d = await r.json();

    patient.innerHTML = "";

    d.forEach(p => {
        patient.innerHTML += `<option value="${p.id}">${p.full_name} (${p.iin})</option>`;
    });
}

async function save() {
    await fetch("/add_record", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            doctor_id: doctor_id.value,
            patient_id: patient.value,
            diagnosis: diagnosis.value
        })
    });

    alert("Saved ✅");
}

window.onload = loadPatients;

</script>

</body>
</html>
