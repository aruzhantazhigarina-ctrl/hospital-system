<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Admin Panel</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #4facfe, #00f2fe);
    display: flex;
    flex-direction: column;
    align-items: center;
}

h1 {
    color: white;
    margin: 20px;
}

button {
    padding: 10px 15px;
    border: none;
    border-radius: 10px;
    background: #ff7eb3;
    color: white;
    cursor: pointer;
    margin-top: 10px;
}

button:hover {
    background: #ff4f9a;
}

#out {
    width: 100%;
    max-width: 1100px;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
    gap: 20px;
    padding: 20px;
}

.card {
    background: white;
    border-radius: 20px;
    padding: 15px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}

.card img {
    width: 100%;
    border-radius: 15px;
    margin-bottom: 10px;
}

.form {
    width: 100%;
    max-width: 400px;
    background: white;
    padding: 20px;
    margin: 20px;
    border-radius: 15px;
}

input, select {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 10px;
}
</style>
</head>

<body>

<h1>✨ Admin Panel</h1>

<button onclick="load()">📋 Show Appointments</button>

<div id="out"></div>

<div class="form">
<h2>➕ Add Diagnosis</h2>

<select id="patient"></select>
<input id="doctor_id" placeholder="Doctor ID">
<input id="diagnosis" placeholder="Diagnosis">

<button onclick="save()">💾 Save</button>
</div>

<script>

async function load(){
 let r = await fetch("/all_appointments")
 let d = await r.json()

 out.innerHTML = ""

 d.forEach(x=>{
  out.innerHTML += `
  <div class="card">

    <img src="https://images.unsplash.com/photo-1588776814546-ec7e3d7a6f12">

    <h3>👨‍⚕️ ${x.doctor}</h3>
    <p>🩺 ${x.specialization}</p>
    <p>🚪 Кабинет: ${x.cabinet}</p>

    <hr>

    <p>🙍 ${x.patient}</p>
    <p>📱 ИИН: ${x.iin}</p>

    <hr>

    <p>📆 ${x.date}</p>
    <p>⏱️ ${x.time}</p>

    <button onclick="del(${x.id})">❌ Delete</button>

  </div>`
 })
}

async function loadPatients(){
 let r = await fetch("/patients")
 let d = await r.json()

 patient.innerHTML = ""

 d.forEach(p=>{
  patient.innerHTML += `
    <option value="${p.id}">
      ${p.full_name} (${p.iin})
    </option>`
 })
}

async function save(){
 await fetch("/add_record",{
  method:"POST",
  headers:{"Content-Type":"application/json"},
  body:JSON.stringify({
   doctor_id:doctor_id.value,
   patient_id:patient.value,
   diagnosis:diagnosis.value
  })
 })

 alert("Saved ✅")
}

async function del(id){
 if(!confirm("Удалить запись?")) return

 await fetch('/delete_appointment/'+id, {
   method: 'DELETE'
 })

 load()
}

window.onload = loadPatients

</script>

</body>
</html>
